<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAVEN — Сервери</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020408;--bg2:#060c14;--panel:#080f1a;
  --border:#0d2035;--border2:#1a3a5c;
  --c1:#00d4ff;--c2:#7000ff;--c3:#ff003c;
  --green:#00ff9d;--yellow:#ffcc00;
  --text:#c8dff0;--muted:#2a4a6a;
  --glow1:rgba(0,212,255,0.25);--glow2:rgba(112,0,255,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;cursor:default;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);z-index:1000;}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 36px;
  background:rgba(2,4,8,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.logo{
  font-family:'Share Tech Mono',monospace;font-size:18px;
  letter-spacing:4px;color:var(--c1);text-decoration:none;
  text-shadow:0 0 16px var(--glow1);
}
.user-bar{display:flex;align-items:center;gap:14px;}
.user-ava{
  width:34px;height:34px;border-radius:0;
  border:1px solid var(--border2);
  clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);
}
.user-name{font-size:14px;font-weight:700;letter-spacing:1px;}
.user-id{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);}
.btn-out{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;padding:7px 14px;
  background:transparent;border:1px solid var(--c3);
  color:var(--c3);text-decoration:none;cursor:pointer;
  transition:all 0.2s;
}
.btn-out:hover{background:rgba(255,0,60,0.1);box-shadow:0 0 12px rgba(255,0,60,0.3);}

/* ── PAGE ── */
.page{max-width:1200px;margin:0 auto;padding:40px 36px;}

.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:32px;padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.page-title{
  font-family:'Share Tech Mono',monospace;
  font-size:28px;letter-spacing:3px;color:var(--c1);
  text-shadow:0 0 20px var(--glow1);
}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
.server-count{
  font-family:'Share Tech Mono',monospace;font-size:13px;
  color:var(--muted);letter-spacing:2px;
}
.server-count span{color:var(--c1);}

/* ── FILTERS ── */
.filters{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.search-box{
  flex:1;min-width:240px;
  background:var(--bg2);border:1px solid var(--border);
  border-left:2px solid var(--c1);
  padding:10px 16px;
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:var(--text);outline:none;transition:all 0.2s;
  letter-spacing:1px;
}
.search-box:focus{border-color:var(--c1);box-shadow:0 0 12px var(--glow1);}
.search-box::placeholder{color:var(--muted);}
.filter-btn{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;padding:10px 18px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);cursor:pointer;transition:all 0.2s;
}
.filter-btn:hover,.filter-btn.active{
  border-color:var(--c1);color:var(--c1);
  background:rgba(0,212,255,0.05);
}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);}

/* ── CARD ── */
.card{
  background:var(--bg2);
  display:flex;flex-direction:column;
  transition:all 0.2s;
  animation:fadeIn 0.4s both;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c1),transparent);
  opacity:0;transition:opacity 0.3s;
}
.card:hover::before{opacity:1;}
.card:hover{background:var(--panel);z-index:2;}

.card-top{
  height:72px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--bg2),var(--panel));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.card-icon{
  width:48px;height:48px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;
  border:1px solid var(--border2);
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  overflow:hidden;background:var(--panel);
}
.card-icon img{width:100%;height:100%;object-fit:cover;}
.status-badge{
  margin-left:auto;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:1px;padding:4px 10px;
  border:1px solid;
}
.status-badge.online{color:var(--green);border-color:rgba(0,255,157,0.3);background:rgba(0,255,157,0.05);}
.status-badge.offline{color:var(--c3);border-color:rgba(255,0,60,0.3);background:rgba(255,0,60,0.05);}

.card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column;}
.card-name{font-size:17px;font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.card-id{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:12px;}
.card-meta{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;
}
.meta-chip{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:1px;padding:3px 8px;
  border:1px solid var(--border2);color:var(--muted);
}
.meta-chip.owner{border-color:rgba(255,204,0,0.4);color:var(--yellow);}

.card-actions{margin-top:auto;display:flex;gap:8px;}
.btn-manage{
  flex:1;font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:2px;padding:10px;text-align:center;
  background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(112,0,255,0.15));
  border:1px solid var(--c1);color:var(--c1);
  text-decoration:none;cursor:pointer;transition:all 0.2s;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
}
.btn-manage:hover{background:linear-gradient(135deg,rgba(0,212,255,0.25),rgba(112,0,255,0.25));box-shadow:0 0 16px var(--glow1);}
.btn-manage.locked{background:rgba(42,74,106,0.2);border-color:var(--border2);color:var(--muted);cursor:not-allowed;pointer-events:none;}
.btn-invite{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:1px;padding:10px 14px;text-align:center;
  background:rgba(0,255,157,0.05);border:1px solid rgba(0,255,157,0.3);
  color:var(--green);text-decoration:none;cursor:pointer;transition:all 0.2s;
}
.btn-invite:hover{background:rgba(0,255,157,0.1);box-shadow:0 0 12px rgba(0,255,157,0.2);}

/* ── EMPTY ── */
.empty{
  grid-column:1/-1;text-align:center;
  padding:80px 20px;color:var(--muted);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.empty-title{font-family:'Share Tech Mono',monospace;font-size:16px;letter-spacing:3px;color:var(--text);margin-bottom:8px;}

/* ── SKELETON ── */
.skel{
  background:linear-gradient(90deg,var(--bg2) 25%,var(--panel) 50%,var(--bg2) 75%);
  background-size:200% 100%;
  animation:skel 1.5s infinite;
  height:220px;
}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">⚡ RAVEN</a>
  <div class="user-bar">
    <img class="user-ava" src="{{ user.avatar_url }}" alt="">
    <div>
      <div class="user-name">{{ user.username }}</div>
      <div class="user-id">UID: {{ user.id }}</div>
    </div>
    <a href="/logout" class="btn-out">ВИЙТИ</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">// СЕРВЕРИ</div>
      <div class="page-sub">Тільки сервери з правами адміністратора або управління</div>
    </div>
    <div class="server-count">ЗНАЙДЕНО: <span id="count">—</span></div>
  </div>

  <div class="filters">
    <input class="search-box" type="text" id="q" placeholder="// ПОШУК СЕРВЕРА..." oninput="filter()">
    <button class="filter-btn active" onclick="setF('all',this)">ВСІ</button>
    <button class="filter-btn" onclick="setF('bot',this)">✅ БОТ АКТИВНИЙ</button>
    <button class="filter-btn" onclick="setF('no',this)">❌ БЕЗ БОТА</button>
    <button class="filter-btn" onclick="setF('owner',this)">👑 МОЇ</button>
  </div>

  <div class="grid" id="grid">
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>
</div>

<script>
let all = [], filt = 'all';
const CID = "{{ client_id }}";

async function load() {
  const res = await fetch('/api/servers');
  all = await res.json();
  render(all);
}

function render(list) {
  document.getElementById('count').textContent = list.length;
  const g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-title">// СЕРВЕРІВ НЕ ЗНАЙДЕНО</div><p>Спробуй інший фільтр</p></div>`;
    return;
  }
  g.innerHTML = list.map((s, i) => {
    const ico = s.icon ? `<img src="${s.icon}" alt="">` : s.name.slice(0,2).toUpperCase();
    const status = s.bot_added;
    const invite = `https://discord.com/oauth2/authorize?client_id=${CID}&permissions=8&scope=bot+applications.commands&guild_id=${s.id}`;
    return `<div class="card" style="animation-delay:${i*0.04}s">
      <div class="card-top">
        <div class="card-icon">${ico}</div>
        <div class="card-name">${s.name}</div>
        <div class="status-badge ${status?'online':'offline'}">${status?'● ONLINE':'○ OFFLINE'}</div>
      </div>
      <div class="card-body">
        <div class="card-id">// ${s.id}</div>
        <div class="card-meta">
          ${s.owner?'<span class="meta-chip owner">👑 ВЛАСНИК</span>':'<span class="meta-chip">🛡️ ADMIN</span>'}
          ${status?'<span class="meta-chip" style="border-color:rgba(0,212,255,0.3);color:#00d4ff">BOT ACTIVE</span>':''}
        </div>
        <div class="card-actions">
          ${status?`<a href="/dashboard/${s.id}" class="btn-manage">▶ ВІДКРИТИ</a>`:
                   `<a class="btn-manage locked">🔒 БОТ ВІДСУТНІЙ</a>`}
          ${!status?`<a href="${invite}" target="_blank" class="btn-invite">+ ДОДАТИ</a>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  let r = all.filter(s => s.name.toLowerCase().includes(q));
  if (filt === 'bot')   r = r.filter(s => s.bot_added);
  if (filt === 'no')    r = r.filter(s => !s.bot_added);
  if (filt === 'owner') r = r.filter(s => s.owner);
  render(r);
}

function setF(f, btn) {
  filt = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter();
}

load();
</script>
</body>
</html>
